name: Weekly Data Update

on:
  schedule:
    - cron: '0 13 * * 1'  # Monday 8 AM ET (1 PM UTC)
  workflow_dispatch:
    inputs:
      qd_export_only:
        description: 'Only run QD export (skip full pipeline)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore SPD image cache
        uses: actions/cache@v4
        with:
          path: |
            spd_images
          key: spd-images-${{ hashFiles('data/rtings_tv_data.csv', 'data/rtings_monitor_data.csv') }}
          restore-keys: spd-images-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly update (all silos)
        env:
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
          BESTBUY_API_KEY: ${{ secrets.BESTBUY_API_KEY }}
          RTINGS_SESSION: ${{ secrets.RTINGS_SESSION }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ "${{ inputs.qd_export_only }}" = "true" ]; then
            python weekly_update.py --qd-export-only
          else
            python weekly_update.py --silo all
          fi

      - name: Commit updated data
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Weekly data update $(date +%Y-%m-%d)"
          git push
